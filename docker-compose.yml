services:
  neo4j:
    image: neo4j:5-community # 5버전 커뮤니티 이미지 지정
    container_name: neo4j-apoc-5
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/password123

      # 5.x 버전 자동 플러그인 설치 설정
      - NEO4J_PLUGINS=["apoc"]

      # 2. 5.x에서 인식 못하는 설정 검증 끄기 (에러 해결 핵심)
      - NEO4J_server_config_strict__validation_enabled=false

      # 5.x 버전부터 변경된 보안 설정 네이밍 (dbms -> server)
      - NEO4J_server_security_procedures_unrestricted=apoc.*
      - NEO4J_server_security_procedures_allowlist=apoc.*

      # APOC에서 로컬 파일 읽기/쓰기를 허용하고 싶을 때 추가
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
